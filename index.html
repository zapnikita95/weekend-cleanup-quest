<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tidy Titans — игра-уборка для семьи и пары</title>
    <meta
      name="description"
      content="Tidy Titans превращает уборку в пиксельную игру: соло, парный режим и квест для ребёнка с призами, QR-ссылками и живыми итогами."
    />
    <meta name="keywords" content="уборка, игра, семья, дети, мотивация, household chores, tidy titans" />
    <link rel="canonical" href="https://www.tidytitans.ru/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tidy Titans" />
    <meta property="og:title" content="Tidy Titans — уборка как игра" />
    <meta
      property="og:description"
      content="Соберите дела, отмечайте с телефона по QR, получайте очки и призы. Соло, вдвоём или квест для ребёнка."
    />
    <meta property="og:url" content="https://www.tidytitans.ru/" />
    <meta property="og:image" content="https://www.tidytitans.ru/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tidy Titans — уборка как игра" />
    <meta
      name="twitter:description"
      content="Пиксельная браузерная игра для уборки: QR на телефон, оценки, призы и итоговая страница."
    />
    <meta name="twitter:image" content="https://www.tidytitans.ru/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "VideoGame",
            "name": "Tidy Titans",
            "url": "https://www.tidytitans.ru/",
            "description": "Браузерная пиксельная игра, которая превращает домашние дела в квест с очками, QR-ссылками и призами.",
            "applicationCategory": "Game",
            "operatingSystem": "Web",
            "inLanguage": "ru",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "RUB" }
          },
          {
            "@type": "HowTo",
            "name": "Как сыграть в Tidy Titans",
            "step": [
              { "@type": "HowToStep", "name": "Выберите режим", "text": "Соло, парная игра или квест для ребёнка." },
              { "@type": "HowToStep", "name": "Соберите список дел", "text": "Отметьте комнаты и задачи, задайте приз или цель по очкам." },
              { "@type": "HowToStep", "name": "Играйте с телефона", "text": "Откройте QR-ссылку и отмечайте выполненные дела." },
              { "@type": "HowToStep", "name": "Подведите итоги", "text": "Получите очки, оценки и приз на финальной странице." }
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Можно ли играть одному?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Да. В соло-режиме вы играете без оценок от партнёра: только очки за дела, скорость и приз по цели."
                }
              },
              {
                "@type": "Question",
                "name": "Как работает квест для ребёнка?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Родитель задаёт призы за бронзу, серебро и золото. Ребёнок отмечает дела по ссылке или QR и видит итог с призом."
                }
              },
              {
                "@type": "Question",
                "name": "Нужно ли устанавливать приложение?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Нет. Tidy Titans работает в браузере на компьютере и телефоне."
                }
              }
            ]
          }
        ]
      }
    </script>
    <style>
      /* Boot splash: keep the same purple + grid as the game (never solid black —
         opaque body background hides body::before grid after CSS loads). */
      :root {
        color: #fffaf0;
        font-family: "Courier New", ui-monospace, monospace;
        background:
          radial-gradient(circle at 15% 20%, rgba(255, 121, 184, 0.4), transparent 24%),
          radial-gradient(circle at 85% 10%, rgba(102, 227, 255, 0.35), transparent 26%),
          linear-gradient(135deg, #211642 0%, #342063 48%, #1a1638 100%);
      }
      html, body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.1) 2px, transparent 2px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.1) 2px, transparent 2px);
        background-size: 32px 32px;
        -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.25));
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.25));
      }
      #root, #seo-prerender { position: relative; z-index: 1; }
      #seo-prerender {
        box-sizing: border-box;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 12px;
        padding: 32px 20px;
        text-align: center;
        text-shadow: 2px 2px 0 rgba(31, 24, 61, 0.55);
      }
      #seo-prerender[hidden] { display: none !important; }
      #seo-prerender h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        line-height: 1.15;
      }
      #seo-prerender p {
        margin: 0 auto;
        max-width: 36rem;
        opacity: 0.9;
        line-height: 1.5;
      }
      #seo-prerender .boot-status {
        margin-top: 8px;
        font-size: 0.95rem;
        opacity: 0.75;
      }
      #root:not(:empty) + #seo-prerender,
      body:has(#root:not(:empty)) #seo-prerender { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="seo-prerender">
      <h1>Tidy Titans — уборка выходного дня как игра</h1>
      <p>
        Пиксельная браузерная игра для семьи: соло, вдвоём и квест для ребёнка с QR-ссылками, очками и призами.
      </p>
      <p class="boot-status">Загружаем игру…</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
