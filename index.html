<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tidy Titans — игра-уборка для семьи и пары</title>
    <meta
      name="description"
      content="Tidy Titans превращает уборку в пиксельную игру: соло, парный режим и квест для ребёнка с призами, QR-ссылками и живыми итогами."
    />
    <meta name="keywords" content="уборка, игра, семья, дети, мотивация, household chores, tidy titans" />
    <link rel="canonical" href="https://tidytitans.ru/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tidy Titans" />
    <meta property="og:title" content="Tidy Titans — уборка как игра" />
    <meta
      property="og:description"
      content="Соберите дела, отмечайте с телефона по QR, получайте очки и призы. Соло, вдвоём или квест для ребёнка."
    />
    <meta property="og:url" content="https://tidytitans.ru/" />
    <meta property="og:image" content="https://tidytitans.ru/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tidy Titans — уборка как игра" />
    <meta
      name="twitter:description"
      content="Пиксельная браузерная игра для уборки: QR на телефон, оценки, призы и итоговая страница."
    />
    <meta name="twitter:image" content="https://tidytitans.ru/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "VideoGame",
            "name": "Tidy Titans",
            "url": "https://tidytitans.ru/",
            "description": "Браузерная пиксельная игра, которая превращает домашние дела в квест с очками, QR-ссылками и призами.",
            "applicationCategory": "Game",
            "operatingSystem": "Web",
            "inLanguage": "ru",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "RUB" }
          },
          {
            "@type": "HowTo",
            "name": "Как сыграть в Tidy Titans",
            "step": [
              { "@type": "HowToStep", "name": "Выберите режим", "text": "Соло, парная игра или квест для ребёнка." },
              { "@type": "HowToStep", "name": "Соберите список дел", "text": "Отметьте комнаты и задачи, задайте приз или цель по очкам." },
              { "@type": "HowToStep", "name": "Играйте с телефона", "text": "Откройте QR-ссылку и отмечайте выполненные дела." },
              { "@type": "HowToStep", "name": "Подведите итоги", "text": "Получите очки, оценки и приз на финальной странице." }
            ]
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Можно ли играть одному?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Да. В соло-режиме вы играете без оценок от партнёра: только очки за дела, скорость и приз по цели."
                }
              },
              {
                "@type": "Question",
                "name": "Как работает квест для ребёнка?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Родитель задаёт призы за бронзу, серебро и золото. Ребёнок отмечает дела по ссылке или QR и видит итог с призом."
                }
              },
              {
                "@type": "Question",
                "name": "Нужно ли устанавливать приложение?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Нет. Tidy Titans работает в браузере на компьютере и телефоне."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="seo-prerender" hidden>
      <h1>Tidy Titans — уборка выходного дня как игра</h1>
      <p>
        Пиксельная браузерная игра для семьи: соло, вдвоём и квест для ребёнка с QR-ссылками, очками и призами.
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
